name: ChainResume CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install frontend deps
        working-directory: ./frontend
        run: npm install --legacy-peer-deps
      - name: Build frontend
        working-directory: ./frontend
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://test.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRlc3QiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTYwMDAwMDAwMCwiZXhwIjoxOTAwMDAwMDAwfQ.test
          VITE_WALLETCONNECT_PROJECT_ID: test123456789
          VITE_CONTRACT_ADDRESS: "0x0000000000000000000000000000000000000000"
          VITE_API_URL: http://localhost:8000
          VITE_PINATA_API_KEY: test
          VITE_PINATA_SECRET_KEY: test
      - run: echo "Frontend OK"

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install backend deps
        working-directory: ./backend
        run: pip install -r requirements.txt
      - name: Test backend starts
        working-directory: ./backend
        run: |
          python -c "import os
          os.environ['GROQ_API_KEY'] = 'test'
          os.environ['SUPABASE_URL'] = 'https://test.supabase.co'
          os.environ['SUPABASE_SERVICE_KEY'] = 'test'
          os.environ['PINATA_API_KEY'] = 'test'
          os.environ['PINATA_SECRET_KEY'] = 'test'
          from app.main import app
          print('Backend OK')"
      - run: echo "Backend OK"

  test-contracts:
    name: Test Smart Contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Check if contracts exist
        run: |
          if [ -f contracts/package.json ]; then
            echo "Contracts found"
          else
            echo "No contracts folder, skipping"
            exit 0
          fi
      - name: Install contract deps
        working-directory: ./contracts
        run: npm install
        continue-on-error: true
      - name: Compile contracts
        working-directory: ./contracts
        run: npx hardhat compile
        continue-on-error: true
      - run: echo "Contracts OK"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build frontend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./Dockerfile.frontend
          push: false
          tags: chainresume-frontend:ci
      - name: Build backend Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./Dockerfile.backend
          push: false
          tags: chainresume-backend:ci
      - run: echo "Docker builds OK"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [test-frontend, test-backend, test-contracts, docker-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args: '--prod'
        continue-on-error: true
      - run: echo "Deploy complete"
